version: '3'

vars:
  SCRIPTS_DIR: ./scripts

tasks:
  # ---------------------------------------------------------------------------
  # Setup
  # ---------------------------------------------------------------------------
  setup:install-kvm:
    desc: Install KVM, libvirt, and related packages
    cmd: sudo {{.SCRIPTS_DIR}}/setup/install-kvm.sh

  # ---------------------------------------------------------------------------
  # Linux Bridge
  # ---------------------------------------------------------------------------
  bridge:status:
    desc: Show status and recommendations for all bridges (or specify BRIDGE=br0)
    cmd: '{{.SCRIPTS_DIR}}/linux-bridge/show-bridge-status.sh {{.BRIDGE | default ""}}'
    vars:
      BRIDGE: '{{.BRIDGE}}'

  bridge:create:
    desc: Create a network bridge (requires PHYS_IF and BRIDGE_NAME)
    cmd: sudo {{.SCRIPTS_DIR}}/linux-bridge/create-bridge.sh --phys-if {{.PHYS_IF}} --bridge-name {{.BRIDGE_NAME}}
    requires:
      vars: [PHYS_IF, BRIDGE_NAME]

  bridge:restore:
    desc: Restore network after bridge removal
    cmd: sudo {{.SCRIPTS_DIR}}/linux-bridge/restore-network.sh

  # ---------------------------------------------------------------------------
  # Tools
  # ---------------------------------------------------------------------------
  tools:clean-vms:
    desc: Remove all VMs (destroy and undefine)
    cmd: sudo {{.SCRIPTS_DIR}}/tools/clean-all-vms.sh

  tools:clean-networks:
    desc: Remove all KVM networks
    cmd: sudo {{.SCRIPTS_DIR}}/tools/clean-kvm-network.sh

  tools:init-cloud-config:
    desc: Create a cloud-init user-data template (requires DIR=<path>)
    cmd: '{{.SCRIPTS_DIR}}/tools/init-cloud-config.sh {{.DIR}}'
    requires:
      vars: [DIR]

  # ---------------------------------------------------------------------------
  # OS Images
  # ---------------------------------------------------------------------------
  images:list:
    desc: List all OS images and their download status
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh list'

  images:download:all:
    desc: Download all OS cloud images
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh all'

  images:download:ubuntu22:
    desc: Download Ubuntu 22.04 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh ubuntu_22'

  images:download:ubuntu24:
    desc: Download Ubuntu 24.04 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh ubuntu_24'

  images:download:rocky9:
    desc: Download Rocky Linux 9 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh rocky_9'

  images:download:debian12:
    desc: Download Debian 12 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh debian_12'

  images:remove:all:
    desc: Remove all downloaded OS images
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh remove all'

  images:remove:ubuntu22:
    desc: Remove Ubuntu 22.04 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh remove ubuntu_22'

  images:remove:ubuntu24:
    desc: Remove Ubuntu 24.04 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh remove ubuntu_24'

  images:remove:rocky9:
    desc: Remove Rocky Linux 9 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh remove rocky_9'

  images:remove:debian12:
    desc: Remove Debian 12 cloud image
    cmd: '{{.SCRIPTS_DIR}}/tools/get-os-image.sh remove debian_12'

  # ---------------------------------------------------------------------------
  # KVM Network Reader
  # ---------------------------------------------------------------------------
  net:info:
    desc: Show network info for a KVM network (requires NET=<name>)
    cmd: '{{.SCRIPTS_DIR}}/../modules/quick-kvm-network-reader/scripts/kvm-net-info.sh {{.NET}}'
    requires:
      vars: [NET]

  net:test:
    desc: Run tests for kvm-net-info.sh
    cmd: ./modules/quick-kvm-network-reader/scripts/test-kvm-net-info.sh